name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Pin JUCE to required commit
        run: |
          cd libs/JUCE
          git fetch origin 7c89e11f6b7316c369f3d3f22227c60e816e738b
          git checkout 7c89e11f6b7316c369f3d3f22227c60e816e738b

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          $exe = "build/OpenDaw_artefacts/Release/OpenDaw.exe"
          windeployqt --release --no-translations --no-opengl-sw $exe

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          Compress-Archive -Path "build/OpenDaw_artefacts/Release/*" -DestinationPath "OpenDaw-v${version}-portable.zip"

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' `
            /DMyAppVersion="$version" `
            /DSourceDir="$PWD\build\OpenDaw_artefacts\Release" `
            /DOutputDir="$PWD" `
            /DOutputBaseFilename="OpenDaw-v${version}-setup" `
            /DLicenseDir="$PWD" `
            "installer\opendaw.iss"
          # Fallback: move from installer\Output if Inno Setup ignored OutputDir
          if (-not (Test-Path "OpenDaw-v${version}-setup.exe")) {
            $found = Get-ChildItem -Recurse -Filter "*setup*.exe" | Select-Object -First 1
            if ($found) { Move-Item $found.FullName "OpenDaw-v${version}-setup.exe" }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            OpenDaw-v*-portable.zip
            OpenDaw-v*-setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Pin JUCE to required commit
        run: |
          cd libs/JUCE
          git fetch origin 7c89e11f6b7316c369f3d3f22227c60e816e738b
          git checkout 7c89e11f6b7316c369f3d3f22227c60e816e738b

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          cache: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt into app bundle
        run: |
          "${{ env.QT_ROOT_DIR }}/bin/macdeployqt" "build/OpenDaw_artefacts/Release/OpenDaw.app"

      - name: Package DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          hdiutil create -volname "OpenDaw" \
            -srcfolder "build/OpenDaw_artefacts/Release/OpenDaw.app" \
            -ov -format UDZO \
            "OpenDaw-v${VERSION}-mac.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: OpenDaw-v*-mac.dmg

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Pin JUCE to required commit
        run: |
          cd libs/JUCE
          git fetch origin 7c89e11f6b7316c369f3d3f22227c60e816e738b
          git checkout 7c89e11f6b7316c369f3d3f22227c60e816e738b

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev ladspa-sdk \
            libfreetype-dev libfreetype6-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libcurl4-openssl-dev libfontconfig1-dev \
            libwebkit2gtk-4.0-dev libgtk-3-dev \
            libglu1-mesa-dev mesa-common-dev \
            libcups2-dev libssl-dev libxkbcommon-dev \
            ninja-build libfuse2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          cache: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Package AppImage
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          mkdir -p AppDir/usr/bin
          cp build/OpenDaw_artefacts/Release/OpenDaw AppDir/usr/bin/

          cat > OpenDaw.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=OpenDaw
          Exec=OpenDaw
          Icon=OpenDaw
          Categories=Audio;AudioVideo;Music;
          Comment=Free, open-source Digital Audio Workstation
          EOF

          cp resources/icon.png OpenDaw.png

          export QMAKE="${{ env.QT_ROOT_DIR }}/bin/qmake"
          export APPIMAGE_EXTRACT_AND_RUN=1
          export VERSION="$VERSION"

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/OpenDaw \
            --desktop-file OpenDaw.desktop \
            --icon-file OpenDaw.png \
            --plugin qt \
            --output appimage

          mv OpenDaw-*.AppImage "OpenDaw-v${VERSION}-linux-x86_64.AppImage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: OpenDaw-v*-linux-x86_64.AppImage

  release:
    needs: [build-windows, build-macos, build-linux]
    if: always() && !cancelled() && contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenDaw ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            OpenDaw-v*-portable.zip
            OpenDaw-v*-setup.exe
            OpenDaw-v*-mac.dmg
            OpenDaw-v*-linux-x86_64.AppImage
